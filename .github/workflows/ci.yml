name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --extra test
      - name: Lint with ruff
        run: |
          uvx ruff check .
          uvx ruff format --check .
      - name: Test with pytest
        run: uv run pytest -n auto

  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --extra test
      - name: Restore benchmark cache
        uses: actions/cache/restore@v4
        with:
          path: .benchmarks
          # Unique key per commit; restore-keys falls back to the most recent
          # cached result for this OS so we always compare against a baseline.
          key: benchmark-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            benchmark-${{ runner.os }}-
      - name: Run benchmark (two-level sech 2π)
        run: |
          uv run pytest tests/bench_mb_solve.py::test_bench_two_level_sech_2pi \
            --benchmark-only \
            --benchmark-save=ci \
            --benchmark-compare \
            --benchmark-compare-fail=mean:25%
      - name: Save benchmark cache
        # Only update the baseline when the benchmark passes; a regression
        # (failed compare) leaves the previous baseline intact.
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .benchmarks
          key: benchmark-${{ runner.os }}-${{ github.sha }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: sudo apt-get install -y pandoc
      - name: Install dependencies
        run: uv sync --extra docs
      - name: Build docs
        # nbsphinx_execute=never uses stored notebook outputs rather than
        # re-running simulations, keeping CI fast. Run a full local build
        # (without this override) after editing notebooks.
        run: uv run sphinx-build -D nbsphinx_execute=never docs docs/_build -b html -W
